<!DOCTYPE html>
<html lang="{{ page.lang | default: 'de' }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="{{ '/images/favicon-32x32.svg' | relative_url }}">
  <!-- Google Fonts CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <!-- Self host font -->
  <!-- <link rel="preload" href="{{ '/assets/fonts/playfair-display.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin> -->
  <link href="{{ '/assets/css/style.css' | relative_url }}" rel="stylesheet">
  {% seo %}
  {% if page.lang_alternate %}
    {% if page.lang == 'en' %}
  <link rel="alternate" hreflang="en" href="{{ page.url | absolute_url }}" />
  <link rel="alternate" hreflang="de" href="{{ page.lang_alternate | absolute_url }}" />
  <link rel="alternate" hreflang="x-default" href="{{ page.lang_alternate | absolute_url }}" />
    {% else %}
  <link rel="alternate" hreflang="de" href="{{ page.url | absolute_url }}" />
  <link rel="alternate" hreflang="en" href="{{ page.lang_alternate | absolute_url }}" />
  <link rel="alternate" hreflang="x-default" href="{{ page.url | absolute_url }}" />
    {% endif %}
  {% endif %}

</head>

<body class='page {{layout.bodyClass}}'>
  {% include main-menu-mobile.html %}
  <div id="wrapper" class="wrapper">
    {% include header.html headerClass='header-extra' %}
    {{content}}
  </div>
  {% include footer.html %}
  {% include sub-footer.html %}
  <script type="text/javascript" src="{{ '/assets/js/scripts.js' | relative_url }}"></script>
  <script>
    (function() {
      if (!localStorage.getItem('lang-preference')) {
        var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
        if (lang.indexOf('de') === -1 && window.location.pathname === '{{ '/' | relative_url }}') {
          localStorage.setItem('lang-preference', 'en');
          window.location.href = '{{ '/en/' | relative_url }}';
        }
      }
    })();
  </script>
  {% include google-analytics.html %}
</body>
</html>
