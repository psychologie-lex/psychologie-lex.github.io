<div class='header'>
  <div class="container">
    <div class="logo">
      <a href="{{ '/' | relative_url }}"><img width="{{ site.logos.desktop_width }}" height="{{ site.logos.desktop_height }}" alt="{{ site.title }}" src="{{ site.logos.desktop | relative_url }}" /></a>
    </div>
    <div class="logo-mobile">
      <a href="{{ '/' | relative_url }}"><img width="{{ site.logos.mobile_width }}" height="{{ site.logos.mobile_height }}" alt="{{ site.title }}" src="{{ site.logos.mobile | relative_url }}" /></a>
    </div>
    <div class="header-right">
      {% include main-menu.html %}
      <div class="lang-switcher">
        {% if page.lang == 'en' %}
          <a href="{{ page.lang_alternate | default: '/' | relative_url }}">DE</a>
          <span class="lang-sep">|</span>
          <span class="lang-active">EN</span>
        {% else %}
          <span class="lang-active">DE</span>
          <span class="lang-sep">|</span>
          <a href="{{ page.lang_alternate | default: '/en/' | relative_url }}">EN</a>
        {% endif %}
      </div>
    </div>
    {% include hamburger.html %}
  </div>
</div>
