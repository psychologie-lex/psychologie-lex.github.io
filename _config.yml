baseurl: ''
permalink: pretty
title: 'Psychologie Lex'

logo:
  mobile: "images/logo/logo-mobile.svg"
  mobile_height: "32px"
  mobile_width: "32px"
  desktop: "images/logo/logo.svg"
  desktop_height: "48px"
  desktop_width: "180px"

home: 
  limit_services: 6

collections:
  services:
    output: true
    sort_by: weight
  services_en:
    output: true
    sort_by: weight
  team:
    output: true

defaults:
  - scope:
      path: ""
      type: "services"
    values:
      layout: "service"
      lang: de
  - scope:
      path: ""
      type: "services_en"
    values:
      layout: "service"
      lang: en
      permalink: "/en/services/:name/"
  - scope:
      path: ""
      type: "team"
    values:
      layout: "team"
  - scope:
      path: "en"
    values:
      lang: en

sass:
  style: compressed # possible values: nested expanded compact compressed
  load_paths:
    - node_modules
  silence_deprecations:
    - color-functions
    - if-function
    - global-builtin
    - import

plugins:
  - jekyll-environment-variables

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE.md
  - LICENSE
  - README.md
